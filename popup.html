<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brainrot Or Not</title>
    <script type="module" src="/scripts/popup.ts"></script>
  </head>
  <body>
    <main class="w-80 p-4 flex flex-col gap-3">
      <div class="flex items-center gap-2">
        <img src="assets/ext-icon.png" class="h-7 w-7"/>
        <h1 class="m-0 text-lg font-bold">Brainrot Or Not</h1>
      </div>
      <p id="status" class="m-0 text-[13px] leading-[1.4]">Click the button to analyze the video!</p>
      <button
        id="analyze-btn"
        type="button"
        class="border-0 rounded-[10px] bg-gradient-to-br from-sky-500 to-blue-600 text-white text-sm font-bold py-[10px] px-[14px] cursor-pointer disabled:opacity-[0.65] disabled:cursor-not-allowed"
      >Analyze Video</button>

      <section id="result" class="rounded-[10px] border border-slate-300 bg-white p-3 flex flex-col gap-[10px] hidden" aria-live="polite">
        <div class="flex items-center justify-between gap-[10px]">
          <span class="text-xs text-slate-500 uppercase tracking-[0.03em]">Score</span>
          <span id="score" class="text-2xl font-extrabold text-slate-900">-</span>
        </div>
        <div class="flex flex-col items-start gap-[10px]">
          <span class="text-xs text-slate-500 uppercase tracking-[0.03em]">Summary</span>
          <p id="summary" class="m-0 text-[13px] leading-[1.45] text-slate-800"></p>
        </div>
      </section>
    </main>
  </body>
</html>
